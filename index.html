<!DOCTYPE html>
<html lang="en" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script type="module" src="./js/main.js"></script>
    <link rel="shortcut icon" href="/assets/img/favicon.png" type="image/x-icon">
    <title>El Pollo Loco</title>
</head>
<body>
    <h1>El Pollo Loco</h1>
    <div id="startScreen">
        <dialog id="startDialog">
            <div class="dialog-wrapper">
                <button id="playButton">PLAY</button>
                <button>INSTRUCTIONS</button>
                <button>SETTINGS</button>
            </div>
        </dialog>
    </div>
    <dialog id="victoryDialog" class="end-dialog">
        <div class="dialog-wrapper">
            <img src="./assets/img/You won, you lost/You won A.png" alt="">
            <button>PLAY AGAIN</button>
            <button>MENU</button>
        </div>
    </dialog>
    <dialog id="gameOverDialog" class="end-dialog">
        <div class="dialog-wrapper">
            <img src="./assets/img/You won, you lost/Game Over.png" alt="">
            <button>PLAY AGAIN</button>
            <button>MENU</button>
        </div>
    </dialog>
    <canvas id="canvas" class="d-none" width="720" height="480">
    </canvas>
</body>
</html>
